messages:
  start: |
    سلام. متن، فایل، ویس، ویدیو، تصویر، PDF، لینک یوتیوب یا لینک گوگل‌درایو بفرست.

    من می‌توانم چت کنم، فایل‌ها را بخوانم، صدا را به متن تبدیل کنم و خروجی را خلاصه، ترجمه یا مرتب کنم.
  start_contact: |
    سلام، خوش آمدی.

    برای شروع لطفا شماره تماس خودت را با دکمه زیر ارسال کن.
  help: |
    راهنما:

    • متن بفرستید: چت با هوش مصنوعی
    • ویس/صدا/ویدیو بفرستید: تبدیل به متن
    • عکس/PDF بفرستید: استخراج متن
    • لینک بفرستید: خواندن و خلاصه‌سازی
    • در گروه‌ها روی پیام ریپلای کنید و بات را صدا بزنید

    دکمه‌های زیر نتایج برای ترجمه، خلاصه، جزوه‌سازی و سوال پرسیدن هستند.
